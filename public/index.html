<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WavelogQSOStats2Awtrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f14;
  --surface: #141820;
  --border:  #252c3a;
  --accent:  #507eae;
  --accent2: #3a6491;
  --danger:  #ff4f4f;
  --text:    #c8d6e5;
  --muted:   #56657a;
  --mono:    'Share Tech Mono', monospace;
  --sans:    'Barlow Condensed', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  font-size: 16px; min-height: 100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 80% 10%, rgba(80,126,174,.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 10% 90%, rgba(58,100,145,.05) 0%, transparent 60%);
}
header {
  display: flex; align-items: center; gap: 14px;
  padding: 20px 28px 16px; border-bottom: 1px solid var(--border);
}

.status-pill {
  margin-left: auto; font-family: var(--mono); font-size: .72rem;
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--muted);
  color: var(--muted); display: flex; align-items: center; gap: 6px;
}
.status-pill .dot { width:7px;height:7px;border-radius:50%;background:var(--muted);animation:pulse 2s infinite; }
.status-pill.ok  { border-color:var(--accent);  color:var(--accent);  }
.status-pill.ok  .dot { background:var(--accent); }
.status-pill.err { border-color:var(--danger);   color:var(--danger);  }
.status-pill.err .dot { background:var(--danger); animation:none; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

.layout {
  display: grid; grid-template-columns: 300px 1fr; gap: 0;
  height: calc(100vh - 73px);
  overflow: hidden;                /* layout itself does not scroll */
}
aside {
  border-right: 1px solid var(--border);
  overflow-y: auto;                /* sidebar scrolls independently */
  height: 100%;                   /* fill the full layout height */
  padding: 16px 14px; display: flex; flex-direction: column; gap: 12px;
}
main { overflow-y: auto; height: 100%; padding: 20px 24px; }

.card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; flex-shrink:0; }
.card-head {
  padding:10px 14px; border-bottom:1px solid var(--border);
  font-size:.75rem; font-family:var(--mono); letter-spacing:.12em;
  color:var(--muted); text-transform:uppercase;
  display:flex; align-items:center; gap:8px;
}
.card-head svg { width:14px;height:14px;opacity:.6; }
.card-body { padding:12px; display:flex; flex-direction:column; gap:9px; }

.field label {
  display:block; font-size:.78rem; font-weight:600; letter-spacing:.04em;
  color:var(--muted); text-transform:uppercase; margin-bottom:4px;
}
input[type=text], input[type=number] {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); font-family:var(--mono);
  font-size:.85rem; padding:6px 10px; outline:none; transition:border-color .15s;
}
input[type=text]:focus, input[type=number]:focus { border-color:var(--accent); }
input::placeholder { color:var(--muted); opacity:.5; }

.btn {
  display:inline-flex; align-items:center; gap:6px; padding:7px 14px;
  border:none; border-radius:7px; font-family:var(--sans); font-size:.85rem;
  font-weight:600; cursor:pointer; transition:opacity .15s,transform .1s; letter-spacing:.03em;
}
.btn:active { transform:scale(.97); }
.btn-primary   { background:var(--accent); color:#ffffff; }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text); }
.btn-secondary:hover { border-color:var(--accent2); color:var(--accent2); }
.btn-danger { background:transparent; border:1px solid var(--danger); color:var(--danger); }
.btn-danger:hover { background:rgba(255,79,79,.08); }
.btn-full { width:100%; justify-content:center; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

#logBox {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; font-family:var(--mono); font-size:.8rem; color:var(--text);
  height:120px; flex-shrink:0; overflow-y:auto;
  line-height:1.5; white-space:pre-wrap;
}
#logBox.ok  { border-color:var(--accent); color:var(--accent); }
#logBox.err { border-color:var(--danger); color:var(--danger); }

/* ── Combined table: drag | key | label1 | label2 | icon | sec | effect | toggle | count ── */
.mode-header,
.mode-row {
  display: grid;
  grid-template-columns: 22px 80px 1fr 1fr 72px 44px 100px 32px 76px;
  gap: 6px;
  align-items: center;
}
.mode-header {
  padding: 0 10px 8px;
  font-size: .68rem; font-family: var(--mono);
  color: var(--muted); text-transform: uppercase; letter-spacing: .09em;
}
#modeList { display:flex; flex-direction:column; gap:5px; }
.mode-row {
  background:var(--surface); border:1px solid var(--border);
  border-radius:8px; padding:7px 10px; cursor:grab;
  transition:border-color .15s, background .15s;
}
.mode-row:active { cursor:grabbing; }
.mode-row.sortable-ghost { opacity:.3; }
.mode-row.sortable-drag  { background:#1c2535; border-color:var(--accent2); box-shadow:0 4px 20px rgba(0,0,0,.4); }
.mode-row.is-sum { background:rgba(80,126,174,.04); border-color:rgba(80,126,174,.14); }

.drag-handle { color:var(--muted); font-size:.9rem; text-align:center; user-select:none; }
.mode-key {
  font-family:var(--mono); font-size:.74rem; color:var(--accent);
  background:rgba(80,126,174,.08); border-radius:4px; padding:3px 6px;
  text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.mode-row.is-sum .mode-key { color:var(--accent2); background:rgba(58,100,145,.15); }
.mode-row input[type=text], .mode-row input[type=number] { padding:5px 7px; font-size:.8rem; }
.mode-row input[type=number] { text-align:right; }

.live-count {
  font-family:var(--mono); font-size:.98rem; font-weight:700;
  color:var(--accent); text-align:right; white-space:nowrap;
  transition:color .4s;
}
.live-count.pending { color:var(--muted); font-size:.75rem; font-weight:400; }
.live-count.flash   { color:#fff; }

.toggle { position:relative; width:30px; height:17px; flex-shrink:0; margin:auto; display:block; }
.toggle input { display:none; }
.toggle-slider {
  position:absolute; inset:0; background:var(--border);
  border-radius:9px; cursor:pointer; transition:background .2s;
}
.toggle-slider::after {
  content:''; position:absolute; width:11px; height:11px;
  background:var(--muted); border-radius:50%; top:3px; left:3px;
  transition:transform .2s, background .2s;
}
.toggle input:checked ~ .toggle-slider { background:rgba(80,126,174,.2); }
.toggle input:checked ~ .toggle-slider::after { transform:translateX(13px); background:var(--accent); }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

@media (max-width:900px) {
  .layout { grid-template-columns:1fr; height:auto; }
  aside { border-right:none; border-bottom:1px solid var(--border); }
  .mode-header, .mode-row { grid-template-columns:22px 74px 1fr 66px 40px 30px 68px; }
  .f-text2, .mode-header span:nth-child(4) { display:none; }
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="WavelogQSOStats2Awtrix" style="height:40px;width:auto;">
  <h1 style="font-size:1.3rem;font-weight:700;letter-spacing:.04em;color:#fff;">Wavelog<span style="color:var(--accent);">QSOStats</span>2Awtrix</h1>
  <div class="status-pill" id="statusPill">
    <span class="dot"></span><span id="statusText">Waiting</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="card">
      <div class="card-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2z"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
        Wavelog
      </div>
      <div class="card-body">
        <div class="field"><label>Base URL</label><input id="wavelogUrl" type="text" placeholder="https://wavelog.example.com"></div>
        <div class="field"><label>API Key</label><input id="apiKey" type="text" placeholder="Your Wavelog API Key"></div>
        <div class="field">
          <label>Station IDs <small style="text-transform:none;font-weight:400">(comma-separated)</small></label>
          <input id="stationIds" type="text" placeholder="1, 2">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="10" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Awtrix
      </div>
      <div class="card-body">
        <div class="field"><label>Awtrix IP</label><input id="awtrixIp" type="text" placeholder="192.168.x.x"></div>
        <div class="field"><label>Fetch Interval (seconds)</label><input id="fetchInterval" type="number" value="600" min="10"></div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
      <button class="btn btn-primary btn-full" id="saveBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Configuration
      </button>
      <button class="btn btn-primary btn-full" id="savePushBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Save &amp; Push to Awtrix
      </button>
      <button class="btn btn-secondary btn-full" id="testBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Test Wavelog API
      </button>
      <button class="btn btn-secondary btn-full" id="iconUploadBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Icons to Awtrix
      </button>
    </div>

    <div id="logBox">Ready.</div>
  </aside>

  <!-- Main -->
  <main>
    <div class="card">
      <div class="card-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Display Modes &amp; Live QSO Statistics
        <span style="margin-left:auto;font-size:.67rem;opacity:.4">drag to reorder &nbsp;·&nbsp; rightmost column = live count after API test</span>
      </div>
      <div class="card-body">
        <div class="mode-header">
          <span></span>
          <span>Mode</span>
          <span>Label 1</span>
          <span>Label 2</span>
          <span>Icon</span>
          <span style="text-align:right">Sec</span>
          <span style="text-align:center">Effect</span>
          <span style="text-align:center">On</span>
          <span style="text-align:right">QSOs</span>
        </div>
        <div id="modeList"></div>
      </div>
    </div>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script>
const SUM_KEYS = new Set(['totalQso','totalQsoYear','ft8ft4','digi']);

new Sortable(document.getElementById('modeList'),{
  animation:150, handle:'.drag-handle',
  ghostClass:'sortable-ghost', dragClass:'sortable-drag'
});

function setStatus(state,text){
  const p=document.getElementById('statusPill');
  p.className='status-pill '+(state||'');
  document.getElementById('statusText').textContent=text;
}
function log(msg,cls){
  const b=document.getElementById('logBox');
  b.textContent=msg; b.className=cls||'';
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function renderModes(items){
  const list=document.getElementById('modeList');
  list.innerHTML='';
  items.forEach(item=>{
    const row=document.createElement('div');
    row.className='mode-row'+(SUM_KEYS.has(item.key)?' is-sum':'');
    row.dataset.key=item.key;
    row.innerHTML=`
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="mode-key">${esc(item.key)}</span>
      <input type="text"   class="f-text1" value="${esc(item.text1)}" placeholder="Label 1">
      <input type="text"   class="f-text2" value="${esc(item.text2)}" placeholder="Label 2">
      <input type="text"   class="f-icon"  value="${esc(item.icon)}"  placeholder="Icon ID">
      <input type="number" class="f-dur"   value="${item.duration}" min="1" title="Awtrix display duration (s)">
      <select class="f-effect" title="Background effect" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:.75rem;padding:5px 4px;width:100%;outline:none;">
        <option value="">— none —</option>
      </select>
      <label class="toggle" title="Show on Awtrix">
        <input type="checkbox" class="f-enabled" ${item.enabled?'checked':''}>
        <span class="toggle-slider"></span>
      </label>
      <span class="live-count pending" id="lc-${esc(item.key)}">—</span>
    `;
    list.appendChild(row);
  });
}

function collectModes(){
  return Array.from(document.querySelectorAll('#modeList .mode-row')).map(row=>({
    key:     row.dataset.key,
    text1:   row.querySelector('.f-text1').value.trim(),
    text2:   row.querySelector('.f-text2').value.trim(),
    icon:    row.querySelector('.f-icon').value.trim(),
    duration:Number(row.querySelector('.f-dur').value)||10,
    enabled: row.querySelector('.f-enabled').checked,
    effect:  row.querySelector('.f-effect').value,
  }));
}

async function loadConfig(){
  try{
    const res=await axios.get('/api/config');
    const c=res.data;
    document.getElementById('wavelogUrl').value  =c.wavelogBaseUrl||'';
    document.getElementById('apiKey').value       =c.apiKey||'';
    document.getElementById('stationIds').value   =(c.stationIds||[]).join(', ');
    document.getElementById('awtrixIp').value     =c.awtrixUrl||'';
    document.getElementById('fetchInterval').value=c.fetchInterval||600;
    renderModes(c.displayItems||[]);
    await loadEffects(c.displayItems||[]);
    setStatus('','Config loaded');
  }catch(err){ log('Failed to load config: '+err.message,'err'); }
}

async function loadEffects(items){
  try{
    const res=await axios.get('/api/effects');
    const effects=Array.isArray(res.data)?res.data:[];
    document.querySelectorAll('.f-effect').forEach((sel,idx)=>{
      const current=(items[idx]||{}).effect||'';
      // keep the "none" option, add all effects
      sel.innerHTML='<option value="">— none —</option>';
      effects.forEach(name=>{
        const opt=document.createElement('option');
        opt.value=name; opt.textContent=name;
        if(name===current) opt.selected=true;
        sel.appendChild(opt);
      });
      // if current value not in list, still pre-select it
      if(current && !effects.includes(current)) sel.value='';
    });
  }catch(e){
    // Awtrix not reachable – selects stay with just "none", no error shown
  }
}

function updateLiveCounts(stats){
  document.querySelectorAll('.live-count').forEach(el=>{
    const key=el.id.replace('lc-','');
    const val=stats[key];
    if(val===undefined) return;
    el.textContent=val.toLocaleString('de-DE');
    el.classList.remove('pending');
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),500);
  });
}

document.getElementById('saveBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; log('Saving…');
  try{
    await axios.post('/api/save',{
      wavelogBaseUrl:document.getElementById('wavelogUrl').value.trim(),
      apiKey:        document.getElementById('apiKey').value.trim(),
      stationIds:    document.getElementById('stationIds').value.split(',').map(s=>s.trim()).filter(Boolean),
      awtrixUrl:     document.getElementById('awtrixIp').value.trim(),
      fetchInterval: Number(document.getElementById('fetchInterval').value)||600,
      displayItems:  collectModes(),
    });
    log('Configuration saved ✅','ok'); setStatus('ok','Saved');
  }catch(err){ log('Save failed: '+err.message,'err'); setStatus('err','Error'); }
  btn.disabled=false;
});

document.getElementById('testBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('testBtn');
  btn.disabled=true; log('Testing Wavelog API…'); setStatus('','Testing…');
  try{
    const res=await axios.post('/api/test');
    log(res.data.message,'ok'); setStatus('ok','API OK');
    if(res.data.stats) updateLiveCounts(res.data.stats);
  }catch(err){
    log('Test failed: '+(err.response?.data?.message||err.message),'err');
    setStatus('err','API Error');
  }
  btn.disabled=false;
});

document.getElementById('savePushBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('savePushBtn');
  btn.disabled=true; log('Saving…'); setStatus('','Saving…');
  try{
    // 1. Save
    await axios.post('/api/save',{
      wavelogBaseUrl:document.getElementById('wavelogUrl').value.trim(),
      apiKey:        document.getElementById('apiKey').value.trim(),
      stationIds:    document.getElementById('stationIds').value.split(',').map(s=>s.trim()).filter(Boolean),
      awtrixUrl:     document.getElementById('awtrixIp').value.trim(),
      fetchInterval: Number(document.getElementById('fetchInterval').value)||600,
      displayItems:  collectModes(),
    });
    log('Saved ✅  Pushing to Awtrix…'); setStatus('','Pushing…');
    // 2. Push (backend clears + pushes)
    const res=await axios.post('/api/push');
    log('Saved ✅  '+res.data.message,'ok');
    setStatus('ok','Saved & Pushed');
    if(res.data.stats) updateLiveCounts(res.data.stats);
  }catch(err){
    log('Failed: '+(err.response?.data?.message||err.message),'err');
    setStatus('err','Error');
  }
  btn.disabled=false;
});

document.getElementById('iconUploadBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('iconUploadBtn');
  btn.disabled=true;
  log('Uploading icons to Awtrix…'); setStatus('','Uploading…');
  try{
    const res=await axios.post('/api/upload-icons');
    const d=res.data;
    // Build summary line + per-file detail
    let detail=d.message+'\n';
    if(d.results){
      d.results.forEach(r=>{
        detail+=r.ok ? '  ✅ '+r.file : '  ❌ '+r.file+' → '+r.error;
        detail+='\n';
      });
    }
    log(detail.trim(), d.success?'ok':'err');
    setStatus(d.success?'ok':'err', d.success?'Icons uploaded':'Upload partial');
  }catch(err){
    log('Icon upload failed: '+(err.response?.data?.message||err.message),'err');
    setStatus('err','Upload Error');
  }
  btn.disabled=false;
});

loadConfig();
</script>
</body>
</html>
